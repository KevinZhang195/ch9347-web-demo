<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传应创新AI充电专家</title>
    <style>
/* ============================================================================
   Dashboard — 智能电源管理系统 Web 端样式
   移植自 Windows Qt C++ 端
   ============================================================================ */

:root {
    --gold-top: #F5C518;
    --gold-bottom: #E8960A;
    --gold-text: #E6A817;
    --bg-gray: #EAECEF;
    --disconnected-light: #B0B0B0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", "Arial", sans-serif;
    background: #EAECEF;
    background: var(--bg-gray);
}

/* ── 主容器 ──────────────────────────────────── */
#dashboard {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
}

/* ── 顶部栏 ──────────────────────────────────── */
#top-bar {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 12px 28px;
    background: #E8960A;
    background: linear-gradient(90deg, var(--gold-bottom), var(--gold-top), var(--gold-bottom));
}

#logo-area {
    width: 20%; min-width: 180px;
    display: flex; align-items: center;
}
#logo-area img { height: 31px; max-width: 100%; max-height: 31px; object-fit: contain; }

#model-label {
    flex: 1; text-align: center;
    font-size: 18px;
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: bold; color: #FFFFFF;
}

#conn-status {
    width: 20%; min-width: 180px;
    text-align: right;
    font-size: 16px;
    font-size: clamp(14px, 2vw, 20px);
    font-weight: bold; color: #FFFFFF;
}

#log-toggle-btn {
    display: none;
}

/* ── 主区域 ──────────────────────────────────── */
#main-area {
    flex: 1 1 0;
    display: flex;
    min-height: 0;
}

/* ── 左侧面板（顶栏 + 内容 + 底栏）────────────── */
#left-panel {
    flex: 3 3 0;
    display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
}

/* ── 右侧面板（历史异常数据）──────────────────── */
#right-panel {
    flex: 1 1 0;
    display: none;
    padding: 12px 16px 12px 0;
    min-width: 0; min-height: 0;
}

/* ── 内容区 ──────────────────────────────────── */
#content-area {
    flex: 1 1 0;
    display: flex; flex-direction: column;
    padding: 20px 20px 16px 32px;
    gap: 20px;
    min-height: 0;
    min-width: 0;
}
#content-area > * { margin-bottom: 20px; }
#content-area > *:last-child { margin-bottom: 0; }
@supports (gap: 20px) {
    #content-area > * { margin-bottom: 0; }
}

/* ── 日志面板 ────────────────────────────────── */
#log-panel {
    flex: 0 0 360px;
    display: none; flex-direction: column;
    background: #1E1E1E;
    border-left: 2px solid #333;
    margin: 12px 16px 12px 0;
    border-radius: 10px;
    overflow: hidden;
    user-select: text;
}
#log-panel.visible { display: flex; }

#log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    background: #2A2A2A;
    color: #CCCCCC;
    font-size: 13px;
    font-weight: bold;
    flex-shrink: 0;
    border-bottom: 1px solid #333;
}

#log-header-buttons {
    display: flex; gap: 6px;
}
#log-header-buttons > * { margin-left: 6px; }
#log-header-buttons > *:first-child { margin-left: 0; }
@supports (gap: 6px) {
    #log-header-buttons > * { margin-left: 0; }
}

#log-copy-btn, #log-clear-btn {
    background: #444;
    color: #CCC;
    border: none;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
}
#log-copy-btn:hover, #log-clear-btn:hover { background: #666; }

#log-entries {
    flex: 1 1 0;
    overflow-y: auto;
    padding: 6px 0;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.5;
    user-select: text;
    -webkit-user-select: text;
}

.log-row {
    display: flex;
    padding: 1px 14px;
    border-bottom: 1px solid #2A2A2A;
}
.log-row:hover { background: #2A2A2A; }

.log-time {
    flex: 0 0 82px;
    color: #888;
    font-size: 10px;
}

.log-msg {
    flex: 1 1 0;
    word-break: break-all;
    color: #DDD;
}

.log-warn  .log-msg { color: #FFB74D; }
.log-error .log-msg { color: #EF5350; }
.log-debug .log-msg { color: #81C784; }
.log-info  .log-msg { color: #64B5F6; }

/* 滚动条美化 */
#log-entries::-webkit-scrollbar { width: 6px; }
#log-entries::-webkit-scrollbar-track { background: #1E1E1E; }
#log-entries::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

.content-row {
    display: flex; gap: 20px;
    min-height: 0;
}
.content-row > * { flex: 1 1 0; min-width: 0; min-height: 0; margin-right: 20px; }
.content-row > *:last-child { margin-right: 0; }
@supports (gap: 20px) {
    .content-row > * { margin-right: 0; }
}

#row1 { flex: 3 3 0; }
#row2 { flex: 3 3 0; }
#row3 { flex: 4 4 0; }

/* ── 底部栏 ──────────────────────────────────── */
#bottom-bar {
    flex-shrink: 0;
    display: flex; align-items: center;
    padding: 12px 28px 16px 28px;
    min-height: 70px;
    height: 90px;
    height: clamp(70px, 8vw, 110px);
}

/* ═══════════════════════════════════════════════════════════════ */
/*  统一的卡片容器（所有控件共用）                                      */
/*  阴影与 C++ 一致：12 层，扩散 1~12px，向下偏移 3px                    */
/* ═══════════════════════════════════════════════════════════════ */
.widget-card {
    width: 100%; height: 100%;
    background: #FFFFFF;
    border-radius: 12px;
    border: 1px solid rgba(220,220,220,0.63);
    box-shadow:
        0 3px 3px   1px rgba(0,0,0,0.217),
        0 3px 4px   2px rgba(0,0,0,0.199),
        0 3px 6px   3px rgba(0,0,0,0.181),
        0 3px 8px   4px rgba(0,0,0,0.163),
        0 3px 10px  5px rgba(0,0,0,0.145),
        0 3px 12px  6px rgba(0,0,0,0.127),
        0 3px 14px  7px rgba(0,0,0,0.109),
        0 3px 16px  8px rgba(0,0,0,0.091),
        0 3px 18px  9px rgba(0,0,0,0.072),
        0 3px 20px 10px rgba(0,0,0,0.054),
        0 3px 22px 11px rgba(0,0,0,0.036),
        0 3px 25px 12px rgba(0,0,0,0.018),
        inset 0 1px 0 0 rgba(255,255,255,0.9);
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* 卡片内容区裁剪，但不裁剪阴影（shadow 在 overflow:hidden 之外渲染） */
.widget-card .card-body {
    flex: 1 1 0;
    position: relative;
    min-height: 0;
    overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════ */
/*  标题栏图标（循环次数右侧）                                        */
/* ═══════════════════════════════════════════════════════════════ */
/* ── 标题与卡片边框间距 ── */
.widget-card .card-title {
    padding: 10px 12px 4px;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-title .title-icon {
    float: right;
    height: 1.4em;
    margin-top: -2px;
    opacity: 1;
    transition: opacity 0.2s;
}
.disconnected .card-title .title-icon { opacity: 0.4; }

/* ═══════════════════════════════════════════════════════════════ */
/*  循环次数                                                        */
/* ═══════════════════════════════════════════════════════════════ */
#cycle-count .card-body {
    display: flex; align-items: center; justify-content: center;
    gap: 4px;
}
#cycle-count .cycle-value,
#cycle-count .cycle-unit {
    font-weight: bold; color: #FFB300;
}
#cycle-count.disconnected .cycle-value,
#cycle-count.disconnected .cycle-unit {
    color: #B0B0B0;
    color: var(--disconnected-light);
}

/* ═══════════════════════════════════════════════════════════════ */
/*  电池温度                                                        */
/* ═══════════════════════════════════════════════════════════════ */
#battery-temp .card-body {
    display: flex; align-items: center; justify-content: center;
    gap: 3%;
}
#battery-temp .temp-icon {
    height: 55%;
    max-width: 25%;
    object-fit: contain;
    opacity: 1;
    transition: opacity 0.2s;
}
#battery-temp.disconnected .temp-icon { opacity: 0.4; }

#battery-temp .temp-value {
    font-weight: bold; color: var(--gold-text);
}
#battery-temp.disconnected .temp-value {
    color: #B0B0B0;
    color: var(--disconnected-light);
}

/* ═══════════════════════════════════════════════════════════════ */
/*  异常记录                                                        */
/* ═══════════════════════════════════════════════════════════════ */
#abnormal-record .card-body {
    display: flex; flex-direction: column;
    padding: 0 10px 8px 10px;
    min-height: 0;
}

#abnormal-record .abnormal-header {
    display: flex;
    color: #555;
    flex-shrink: 0;
    padding: 4px 0;
}
#abnormal-record .abnormal-header span { text-align: center; }
#abnormal-record .abnormal-header .col-time  { flex: 0.42; }
#abnormal-record .abnormal-header .col-type  { flex: 0.28; }
#abnormal-record .abnormal-header .col-value { flex: 0.30; }

#abnormal-record .abnormal-rows {
    flex: 1 1 0;
    display: flex; flex-direction: column;
    justify-content: flex-start;
    gap: 10px;
    width: 92%;
    margin: 0 auto;
    padding-top: 2px;
    min-height: 0;
}

#abnormal-record .abnormal-row {
    flex: 0 0 26%;
    display: flex; align-items: center;
    border-radius: 6px;
    color: #FFF;
    min-height: 0;
}
#abnormal-record .abnormal-row span { text-align: center; }
#abnormal-record .abnormal-row .col-time  { flex: 0.42; }
#abnormal-record .abnormal-row .col-type  { flex: 0.28; }
#abnormal-record .abnormal-row .col-value { flex: 0.30; }

/* ═══════════════════════════════════════════════════════════════ */
/*  异常记录切换按钮                                                  */
/* ═══════════════════════════════════════════════════════════════ */
.abnormal-toggle-container {
    position: absolute;
    top: 4px; right: 8px;
    display: flex; align-items: center;
    gap: 4px;
    z-index: 5;
}
.abnormal-toggle-label {
    color: #888;
    white-space: nowrap;
}
.abnormal-toggle-btn {
    background: transparent;
    border: 1px solid #D0D0D0;
    border-radius: 4px;
    color: #666;
    font-weight: bold;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1.2;
}
.abnormal-toggle-btn:hover {
    background: #F0F0F0;
    border-color: #E8960A;
    color: #E8960A;
}

/* ═══════════════════════════════════════════════════════════════ */
/*  历史异常数据面板                                                  */
/* ═══════════════════════════════════════════════════════════════ */
#historical-log-card .card-body {
    display: flex; flex-direction: column;
    padding: 0 8px 8px 8px;
    min-height: 0;
}

.histlog-header {
    display: flex;
    color: #555;
    flex-shrink: 0;
    padding: 4px 0;
}
.histlog-header span { text-align: center; }
.histlog-col-time  { flex: 0.38; }
.histlog-col-type  { flex: 0.28; }
.histlog-col-value { flex: 0.34; }

.histlog-scroll {
    flex: 1 1 0;
    overflow-y: auto;
    min-height: 0;
}

.histlog-empty {
    text-align: center;
    color: #999;
    padding: 20px 0;
    font-size: 12px;
}

.histlog-row {
    border-radius: 5px;
    margin-bottom: 3px;
    color: #FFF;
    overflow: hidden;
}
.histlog-row-content {
    display: flex; align-items: center;
    padding: 4px 0;
}
.histlog-row-content span { text-align: center; }
.histlog-row-content .histlog-col-time  { flex: 0.38; }
.histlog-row-content .histlog-col-type  { flex: 0.28; }
.histlog-row-content .histlog-col-value { flex: 0.34; }

.histlog-orange {
    background: linear-gradient(90deg, #F5A623, #F0C040);
}
.histlog-red {
    background: linear-gradient(90deg, #E03A2F, #F07030);
}

/* 滚动条美化 */
.histlog-scroll::-webkit-scrollbar { width: 6px; }
.histlog-scroll::-webkit-scrollbar-track { background: #F0F0F0; border-radius: 3px; }
.histlog-scroll::-webkit-scrollbar-thumb { background: #CCC; border-radius: 3px; }
.histlog-scroll::-webkit-scrollbar-thumb:hover { background: #E8960A; }

/* ═══════════════════════════════════════════════════════════════ */
/*  底部信息栏                                                      */
/* ═══════════════════════════════════════════════════════════════ */
#battery-info {
    display: flex;
    width: 100%; height: 100%;
    background: #FFFFFF;
    border-radius: 10px;
    border: 1px solid rgba(220,220,220,0.63);
    box-shadow:
        0 3px 3px   1px rgba(0,0,0,0.217),
        0 3px 4px   2px rgba(0,0,0,0.199),
        0 3px 6px   3px rgba(0,0,0,0.181),
        0 3px 8px   4px rgba(0,0,0,0.163),
        0 3px 10px  5px rgba(0,0,0,0.145),
        0 3px 12px  6px rgba(0,0,0,0.127),
        0 3px 14px  7px rgba(0,0,0,0.109),
        0 3px 16px  8px rgba(0,0,0,0.091),
        0 3px 18px  9px rgba(0,0,0,0.072),
        0 3px 20px 10px rgba(0,0,0,0.054),
        0 3px 22px 11px rgba(0,0,0,0.036),
        0 3px 25px 12px rgba(0,0,0,0.018),
        inset 0 1px 0 0 rgba(255,255,255,0.9);
    overflow: hidden;
}

.info-column {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
}
.info-column:not(:last-child) { border-right: 1px solid rgba(220,220,220,0.55); }

.info-label {
    font-weight: bold; color: #1A1A1A;
    font-size: clamp(12px, 1.2vw, 15px);
}
.info-underline {
    width: 40%; height: 2px;
    background: #E6A817;
    background: var(--gold-text);
}
.info-model-value, .info-manufacturer-value, .info-code-value {
    font-weight: bold; color: #E6A817;
    color: var(--gold-text);
    text-align: center; word-break: break-all;
    font-size: clamp(14px, 1.5vw, 18px);
}
#battery-info.disconnected .info-label,
#battery-info.disconnected .info-model-value,
#battery-info.disconnected .info-manufacturer-value,
#battery-info.disconnected .info-code-value {
    color: #B0B0B0;
}
#battery-info.disconnected .info-underline {
    background: #B0B0B0;
}

/* ═══════════════════════════════════════════════════════════════ */
/*  移动端适配 (屏幕宽度 ≤ 768px)                                     */
/* ═══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
    html, body {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
    }

    #dashboard {
        height: auto;
        min-height: 100%;
    }

    /* ── 顶部栏：竖排 ── */
    #top-bar {
        flex-wrap: wrap;
        padding: 8px 12px;
        gap: 4px;
    }

    #logo-area {
        width: auto; min-width: 0;
    }
    #logo-area img { height: clamp(31px, 5vw, 61px); }

    #model-label {
        flex: 1 1 100%;
        text-align: center;
        font-size: 14px;
        order: 3;
    }

    #conn-status {
        width: auto; min-width: 0;
        font-size: 13px;
    }

    /* ── 主区域：竖排 ── */
    #main-area {
        flex-direction: column;
    }

    /* ── 左右面板：竖排 ── */
    #left-panel {
        flex: 0 0 auto;
    }
    #right-panel {
        flex: 0 0 auto;
        padding: 0 8px 8px 8px;
    }
    #right-panel .widget-card {
        height: 260px;
    }

    /* ── 内容区 ── */
    #content-area {
        padding: 10px 8px;
        gap: 8px;
    }

    /* ── 行内卡片：拆为 2 列或单列 ── */
    .content-row {
        flex-wrap: wrap;
        gap: 8px;
    }

    /* Row1: 4个卡片 → 2×2 */
    #row1 > * {
        flex: 1 1 calc(50% - 4px);
        min-width: calc(50% - 4px);
    }

    /* Row2 + Row3: 竖排单列 */
    #row2, #row3 {
        flex-direction: column;
    }

    #row2 > *,
    #row3 > * {
        flex: 0 0 auto;
        min-width: 100%;
    }

    /* 卡片最小高度 */
    #row1 { flex: 0 0 auto; }
    #row2 { flex: 0 0 auto; }
    #row3 { flex: 0 0 auto; }

    .widget-card {
        height: 160px;
        flex: 0 0 auto;
    }
    #cell-voltage.widget-card { height: 200px; }
    #abnormal-record.widget-card { height: 180px; }

    .widget-card .card-title {
        font-size: 12px !important;
        padding: 6px 8px 3px;
    }

    /* ── 底部栏：竖排 ── */
    #bottom-bar {
        height: auto;
        padding: 8px;
    }

    #battery-info {
        flex-direction: column;
    }

    .info-column {
        flex: 0 0 auto;
        padding: 6px 10px;
    }
    .info-column:not(:last-child) {
        border-right: none;
        border-bottom: 1px solid rgba(220,220,220,0.55);
    }

    /* ── 日志面板：全宽覆盖 ── */
    #log-panel {
        flex: 0 0 auto;
        width: 100%;
        max-height: 40vh;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-top: 2px solid #333;
    }

    /* ── 异常记录 ── */
    #abnormal-record .abnormal-header,
    #abnormal-record .abnormal-row {
        font-size: 10px;
    }
}

/* ═══════════════════════════════════════════════════════════════ */
/*  小屏手机 (屏幕宽度 ≤ 400px)                                        */
/* ═══════════════════════════════════════════════════════════════ */
@media (max-width: 400px) {
    /* Row1: 4卡片 → 全单列 */
    #row1 > * {
        flex: 1 1 100%;
        min-width: 100%;
    }

    .widget-card {
        height: 140px;
    }
    #cell-voltage.widget-card { height: 170px; }
    #abnormal-record.widget-card { height: 160px; }

    #top-bar { padding: 6px 8px; }
    #logo-area img { height: clamp(31px, 5vw, 61px); }
    #model-label { font-size: 12px; }
    #conn-status { font-size: 11px; }

    #content-area { padding: 6px 4px; gap: 6px; }
    .content-row { gap: 6px; }

    #right-panel .widget-card {
        height: 220px;
    }
}

</style>
<style>
/* 最小窗口限制 */
html { min-width: 480px; overflow-x: auto; }
body { min-width: 480px; overflow-x: auto; }
#min-window-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 99999;
    justify-content: center; align-items: center; flex-direction: column;
    color: #fff; font-family: sans-serif; text-align: center;
}
#min-window-overlay .icon { font-size: 48px; margin-bottom: 20px; }
#min-window-overlay .msg { font-size: 18px; line-height: 1.6; padding: 0 20px; }
#min-window-overlay .hint { font-size: 14px; color: #aaa; margin-top: 12px; }
#compat-banner {
    display: none;
    padding: 10px 16px;
    background: #FFF4D6;
    border-bottom: 1px solid #E0B84A;
    color: #6B4A00;
    font-size: 14px;
    line-height: 1.4;
    text-align: center;
    flex-shrink: 0;
}
#compat-banner.visible { display: block; }
.legacy-browser #compat-banner { display: block; }
.legacy-browser #main-area, .legacy-browser #bottom-bar { display: none; }
</style>
</head>
<body>
    <!-- KERNEL:legacy-probe -->
    <script>
    (function() {
        var ua = navigator.userAgent || '';
        if (/MSIE|Trident|Edge\//.test(ua)) {
            document.documentElement.className += ' legacy-browser';
        }
    })();
    </script>
    <!-- /KERNEL:legacy-probe -->
    <div id="dashboard">
        <div id="compat-banner">当前浏览器内核过旧，无法运行本演示页面。请使用 Chrome、Microsoft Edge Chromium 或 360 浏览器极速模式。</div>
        <!-- ═══════════════════════════════════════════════════════════════ -->
        <!--  主区域（左侧面板 + 历史异常面板 + 日志面板）                       -->
        <!-- ═══════════════════════════════════════════════════════════════ -->
        <div id="main-area">
        <div id="left-panel">
            <!-- ═══════════════════════════════════════════════════════════════ -->
            <!--  顶部栏                                                         -->
            <!-- ═══════════════════════════════════════════════════════════════ -->

const LayoutObservers = [];
function observeResize(element, callback) {
    if (window.ResizeObserver) {
        const observer = new ResizeObserver(callback);
        observer.observe(element);
        return observer;
    }
    let lastW = -1;
    let lastH = -1;
    let pending = false;
    const check = function() {
        pending = false;
        if (!element) return;
        const w = element.clientWidth;
        const h = element.clientHeight;
        if (w !== lastW || h !== lastH) {
            lastW = w;
            lastH = h;
            callback();
        }

        if (pending) return;
        pending = true;
        (window.requestAnimationFrame || window.setTimeout)(check, 16);
    };
    window.addEventListener('resize', schedule);
    LayoutObservers.push(schedule);
    schedule();

        disconnect: function() {
            window.removeEventListener('resize', schedule);
            const idx = LayoutObservers.indexOf(schedule);
            if (idx >= 0) LayoutObservers.splice(idx, 1);

    <script>
/**
 * DataManager — 数据中心（移植自 C++ DataManager）
 *
 * 使用 EventTarget 替代 Qt 信号/槽。
 * 每个 setXxx() 在值变化时触发 "xxxChanged" CustomEvent。
 */
class DataManager extends EventTarget {
    constructor() {
        super();

        // 系统状态
        this._productModel = "--";
        this._connected = false;

        // 实时电池数据
        this._batteryHealth = 0;
        this._batteryLevel = 0;
        this._totalVoltage = 0;
        this._totalCurrent = 0;
        this._totalPower = 0;
        this._cycleCount = 0;
        this._batteryTemp = 0;

        // 电芯数据（默认 1 个电芯）
        this._cells = [{ voltage: 0, maxVoltage: 4.25 }];

        // 异常记录（3 行固定）
        this._abnormalRecords = [
            { time: null, category: "电压异常", value: "" },
            { time: null, category: "充电过温", value: "" },
            { time: null, category: "放电过温", value: "" }
        ];

        // 历史异常日志（动态列表）
        this._historicalLogs = [];

        // 底部电池信息
        this._batteryModel = "--";
        this._manufacturer = "--";
        this._productionDate = "2026-01-15";
        this._batteryCode = "--";
    }

    // ── 事件发送 ─────────────────────────────────
    _emit(name, detail) {
        this.dispatchEvent(new CustomEvent(name, { detail }));
    }

    // ── 系统状态 ─────────────────────────────────
    get productModel() { return this._productModel; }
    setProductModel(v) {
        if (this._productModel !== v) {
            this._productModel = v;
            this._emit("productModelChanged", v);
        }
    }

    get connected() { return this._connected; }
    setConnected(v) {
        if (this._connected !== v) {
            this._connected = v;
            this._emit("connectedChanged", v);
        }
    }

    // ── 实时数据 ─────────────────────────────────
    get batteryHealth() { return this._batteryHealth; }
    setBatteryHealth(v) {
        v = Math.max(0, Math.min(100, v));
        if (this._batteryHealth !== v) {
            this._batteryHealth = v;
            this._emit("batteryHealthChanged", v);
        }
    }

    get batteryLevel() { return this._batteryLevel; }
    setBatteryLevel(v) {
        v = Math.max(0, Math.min(100, v));
        if (this._batteryLevel !== v) {
            this._batteryLevel = v;
            this._emit("batteryLevelChanged", v);
        }
    }

    get totalVoltage() { return this._totalVoltage; }
    setTotalVoltage(v) {
        if (!this._fuzzyEqual(this._totalVoltage, v)) {
            this._totalVoltage = v;
            this._emit("totalVoltageChanged", v);
        }
    }

    get totalCurrent() { return this._totalCurrent; }
    setTotalCurrent(v) {
        if (!this._fuzzyEqual(this._totalCurrent, v)) {
            this._totalCurrent = v;
            this._emit("totalCurrentChanged", v);
        }
    }

    get totalPower() { return this._totalPower; }
    setTotalPower(v) {
        if (!this._fuzzyEqual(this._totalPower, v)) {
            this._totalPower = v;
            this._emit("totalPowerChanged", v);
        }
    }

    get cycleCount() { return this._cycleCount; }
    setCycleCount(v) {
        if (this._cycleCount !== v) {
            this._cycleCount = v;
            this._emit("cycleCountChanged", v);
        }
    }

    get batteryTemp() { return this._batteryTemp; }
    setBatteryTemp(v) {
        if (!this._fuzzyEqual(this._batteryTemp, v)) {
            this._batteryTemp = v;
            this._emit("batteryTempChanged", v);
        }
    }

    // ── 电芯 ────────────────────────────────────
    get cellCount() { return this._cells.length; }
    setCellCount(count) {
        count = Math.max(1, Math.min(32, count));
        if (this._cells.length !== count) {
            const old = this._cells;
            this._cells = [];
            for (let i = 0; i < count; i++) {
                this._cells.push({
                    voltage: old[i] ? old[i].voltage : 0,
                    maxVoltage: old[i] ? old[i].maxVoltage : 4.25
                });
            }
            this._emit("cellCountChanged", count);
        }
    }

    setCellVoltage(index, voltage, maxVoltage) {
        if (index < 0 || index >= this._cells.length) return;
        const cell = this._cells[index];
        if (maxVoltage > 0) cell.maxVoltage = maxVoltage;
        // 存储原始电压值（不钳制），柱状条视觉由 widget 的 fillRatio 封顶
        const rawVoltage = Math.max(0, voltage);
        if (!this._fuzzyEqual(cell.voltage, rawVoltage)) {
            cell.voltage = rawVoltage;
            this._emit("cellVoltageChanged", { index, voltage: rawVoltage, maxVoltage: cell.maxVoltage });
        }
    }

    // ── 异常记录 ────────────────────────────────
    setAbnormalRecord(row, value, dt) {
        if (row < 0 || row > 2) return;
        this._abnormalRecords[row].value = value;
        this._abnormalRecords[row].time = dt || new Date();
        this._emit("abnormalRecordChanged", { row, value, time: this._abnormalRecords[row].time });
    }

    clearAbnormalRecord(row) {
        if (row < 0 || row > 2) return;
        this._abnormalRecords[row].value = "";
        this._abnormalRecords[row].time = null;
        this._emit("abnormalRecordCleared", row);
    }

    // ── 历史异常日志 ────────────────────────────
    clearHistoricalLogs() {
        this._historicalLogs = [];
        this._emit("historicalLogsCleared", null);
    }

    addHistoricalLog(row, value, dt) {
        const categories = ["电压异常", "充电过温", "放电过温"];
        this._historicalLogs.push({
            row: row,
            category: categories[row] || "未知",
            value: value,
            time: dt || new Date()
        });
        // 限制最多 500 条
        while (this._historicalLogs.length > 500) {
            this._historicalLogs.shift();
        }
        this._emit("historicalLogsUpdated", {
            row, value, time: dt,
            category: categories[row] || "未知"
        });
    }

    // ── 底部信息 ────────────────────────────────
    get batteryModel() { return this._batteryModel; }
    setBatteryModel(v) {
        if (this._batteryModel !== v) {
            this._batteryModel = v;
            this._emit("batteryModelChanged", v);
        }
    }

    get manufacturer() { return this._manufacturer; }
    setManufacturer(v) {
        if (this._manufacturer !== v) {
            this._manufacturer = v;
            this._emit("manufacturerChanged", v);
        }
    }

    get productionDate() { return this._productionDate; }
    setProductionDate(v) {
        if (this._productionDate !== v) {
            this._productionDate = v;
            this._emit("productionDateChanged", v);
        }
    }

    get batteryCode() { return this._batteryCode; }
    setBatteryCode(v) {
        if (this._batteryCode !== v) {
            this._batteryCode = v;
            this._emit("batteryCodeChanged", v);
        }
    }

    // ── 工具 ────────────────────────────────────
    _fuzzyEqual(a, b) {
        return Math.abs(a - b) < 1e-9;
    }
}

</script>

function bcdToDec16(hi, lo) {

    if (ttt <= 1023) return T_0C100C_36_1023[ttt - 36];

// ============================================================================
//  GPDriver 类
// ============================================================================
class GPDriver {
    constructor(dataManager) {
        this._dm = dataManager;
        this._buffer = [];
        this._tickCount = 0;
        this._retryTimer = null;
        this._pollTimer = null;
        this._watchdog = 0;
        this._validFrameWatchdog = 0; // 有效帧看门狗（连续无有效帧计数）
        this._checksumFailCount = 0;  // 连续 Checksum/长度失败计数
        this._opening = false;       // 防止并发打开
        this._started = false;       // 防止重复初始化回调
        this._disconnecting = false; // 防止断开回调递归
        this._stopped = true;        // 页面挂起/退出后禁止自动重连
        this._generation = 0;        // 生命周期序列号，用于页面冻结/恢复场景的异步操作筛选
    }

    // ── 生命周期 ────────────────────────────────
    start() {
        this._stopped = false;
        this._disconnecting = false;
        this._openGen = ++this._generation;
        this._tickCount = 0;
        this._buffer = [];
        this._watchdog = 0;
        this._validFrameWatchdog = 0;
        this._checksumFailCount = 0;

        if (typeof CH9347OpenDevice === 'function') {
            if (!this._started) {
                this._started = true;
                // 注册数据接收回调（仅一次，与官方 Demo 一致）
                if (typeof CH9347ReadDataFromDevice === 'function') {
                    CH9347ReadDataFromDevice((data) => {
                        if (!this._dm.connected) return;
                        if (data && data.length > 0) {
                            try {
                                this._buffer.push(...data);
                                this._watchdog = 0;
                                console.debug('recv: ' + data.length + ' bytes, buf: ' + this._buffer.length);
                                this._processBuffer();
                            } catch(e) {
                                console.error('data callback error: ' + e.message + ' stack: ' + e.stack);
                            }
                        }
                    });
                }

                // 注册连接状态变化回调
                if (typeof CH9347OnStatechange === 'function') {
                    CH9347OnStatechange((status) => {
                        if (!status && !this._stopped) {
                            this._onDisconnected();
                        }
                    });
                }
            }
            this._tryOpenDevice();
        } else {
            console.warn("CH9347Lib.js 未加载，等待中...");
            // 持续重试（CH9347Lib 可能延迟加载）
            this._retryTimer = setInterval(() => {
                if (this._stopped) { clearInterval(this._retryTimer); this._retryTimer = null; return; }
                if (typeof CH9347OpenDevice === 'function') {
                    clearInterval(this._retryTimer);
                    this._retryTimer = null;
                    this.start();
                }
            }, 1000);
        }
    }

    stop() {
        this._stopped = true;
        this._generation++;
        this._clearTimers();
        if (typeof CH9347CloseDevice === 'function') {
            CH9347CloseDevice();
        }
        this._dm.setConnected(false);
    }

    _clearTimers() {
        if (this._retryTimer) { clearInterval(this._retryTimer); this._retryTimer = null; }
        if (this._pollTimer) { clearInterval(this._pollTimer); this._pollTimer = null; }
    }

    // ── CH9347 设备操作 ─────────────────────────
    _tryOpenDevice() {
        if (this._opening || this._stopped) return;
        this._opening = true;
        var openGen = this._generation;

        CH9347OpenDevice(115200).then(res => {
            this._opening = false;
            if (this._generation !== openGen) {
                if (res.success && typeof CH9347CloseDevice === 'function') CH9347CloseDevice();
                return;
            }
            if (res.success) {
                this._onConnected();
            } else {
                console.warn("CH9347 设备打开失败: " + (res.message || "未知错误") + "，1秒后重试...");
                this._scheduleRetry();
            }
        }).catch(err => {
            this._opening = false;
            if (this._generation !== openGen) return;
            console.warn("CH9347 调用异常: " + err + "，1秒后重试...");
            this._scheduleRetry();
        });
    }

    _onConnected() {
        if (this._stopped || this._generation !== this._openGen) {
            if (typeof CH9347CloseDevice === 'function') CH9347CloseDevice();
            return;
        }
        this._disconnecting = false;
        this._clearTimers();
        this._dm.setConnected(true);
        this._tickCount = 0;
        this._buffer = [];
        this._watchdog = 0;
        this._validFrameWatchdog = 0;
        this._checksumFailCount = 0;

        // 20ms 轮询（数据到达检查 + 看门狗）
        this._pollTimer = setInterval(() => this._onPoll(), 20);
        console.log("CH9347 设备已连接，波特率 115200");
    }

    _onDisconnected() {
        if (this._stopped || this._generation !== this._openGen) {
            this._clearTimers();
            this._buffer = [];
            this._dm.setConnected(false);
            return;
        }
        if (this._disconnecting) return;
        this._disconnecting = true;
        console.warn("CH9347 设备断开，1秒后重试...");
        this._clearTimers();
        this._buffer = [];
        this._dm.setConnected(false);
        // 清除异常记录
        for (let i = 0; i < 3; i++) {
            this._dm.clearAbnormalRecord(i);
        }
        // 强制关闭底层，防止旧 readable 流残留
        if (typeof CH9347CloseDevice === 'function') {
            CH9347CloseDevice();
        }
        this._retryTimer = setInterval(() => {
            if (this._stopped) { clearInterval(this._retryTimer); this._retryTimer = null; return; }
            this._disconnecting = false;
            this._tryOpenDevice();
        }, 1000);
    }

    _scheduleRetry() {
        if (this._stopped) return;
        this._clearTimers();
        this._dm.setConnected(false);
        this._retryTimer = setInterval(() => this._tryOpenDevice(), 1000);
    }

    // ── 20ms 轮询（移植自 onTimer usbstsa==1） ──────
    _onPoll() {
        this._tickCount++;
        this._watchdog++;

        // 每 50 tick (1秒) 打印一次心跳
        if (this._tickCount % 50 === 1) {
            console.debug('tick ' + this._tickCount + ' watchdog=' + this._watchdog +
                          ' vfw=' + this._validFrameWatchdog + ' buf=' + this._buffer.length);
        }

        // 200 tick (4秒) 无数据超时 → 断开重连
        if (this._watchdog > 200) {
            console.warn("数据超时（4秒无数据），关闭设备重连");
            this._onDisconnected();
            return;
        }

        // 200 tick (4秒) 无有效帧超时 → 断开重连（防止底层一直返回错包导致看门狗永不触发）
        this._validFrameWatchdog++;
        if (this._validFrameWatchdog > 200) {
            console.warn('有效帧超时（4秒无有效帧），可能是底层数据错位，关闭设备重连');
            this._onDisconnected();
        }
    }

    _processBuffer() {
        try {
            this._findPacketStart();
        } catch(e) {
            console.error('_processBuffer error: ' + e.message + ' stack: ' + e.stack);
        }
    }

    // ── 帧边界检测（移植自 Findpacketstart） ───────
    _findPacketStart() {
        let frameCount = 0;
        while (this._buffer.length >= 6) {
            let found = -1;
            let foundIdx = -1;

            for (let i = 0; i < FRAME_HEADERS.length; i++) {
                const hdr = FRAME_HEADERS[i].bytes;
                const idx = this._indexOf(this._buffer, hdr);
                if (idx >= 0 && (found === -1 || idx < foundIdx)) {
                    found = i;
                    foundIdx = idx;
                }
            }

            if (found < 0) {
                const discard = Math.min(20, this._buffer.length);
                const peek = this._buffer.slice(0, discard).map(b => b.toString(16).padStart(2,'0')).join(' ');
                console.warn('no header found, discarding ' + discard + ' bytes: ' + peek);
                this._buffer.splice(0, discard);
                continue;
            }

            if (foundIdx > 0) {
                console.debug('skipping ' + foundIdx + ' bytes before header 0x' + FRAME_HEADERS[found].mode.toString(16));
                this._buffer.splice(0, foundIdx);
            }

            const hdr = FRAME_HEADERS[found];
            const mode = hdr.mode;

            if (hdr.lenSize === 1) {
                if (this._buffer.length < 7) break;
                const frameLen = this._buffer[6];
                if (frameLen === 0) {
                    console.warn('frameLen=0 for mode 0x' + mode.toString(16) + ', skip 7 bytes');
                    this._buffer.splice(0, 7);
                    continue;
                }
                if (this._buffer.length >= frameLen) {
                    const frame = this._buffer.splice(0, frameLen);
                    if (this._verifyChecksum(frame) && this._checkFrameLen(frame, mode)) {
                        this._transData(frame, mode);
                        frameCount++;
                        this._validFrameWatchdog = 0;
                        this._checksumFailCount = 0;
                    } else {
                        console.warn('Checksum/长度失败，清空 buffer (' + this._buffer.length + ' bytes)');
                        this._buffer = [];
                        break;
                    }
                } else {
                    console.debug('need ' + frameLen + ' bytes for mode 0x' + mode.toString(16) + ', have ' + this._buffer.length + ', waiting');
                    break;
                }
            } else {
                if (this._buffer.length < 8) break;
                const frameLen = (this._buffer[7] << 8) | this._buffer[6];
                if (frameLen === 0) {
                    console.warn('frameLen=0 for mode 0x' + mode.toString(16) + ', skip 8 bytes');
                    this._buffer.splice(0, 8);
                    continue;
                }
                if (this._buffer.length >= frameLen) {
                    const frame = this._buffer.splice(0, frameLen);
                    if (this._verifyChecksum(frame) && this._checkFrameLen(frame, mode)) {
                        this._transData(frame, mode);
                        frameCount++;
                        this._validFrameWatchdog = 0;
                        this._checksumFailCount = 0;
                    } else {
                        console.warn('Checksum/长度失败，清空 buffer (' + this._buffer.length + ' bytes)');
                        this._buffer = [];
                        break;
                    }
                } else {
                    console.debug('need ' + frameLen + ' bytes for mode 0x' + mode.toString(16) + ', have ' + this._buffer.length + ', waiting');
                    break;
                }
            }
        }
        if (frameCount > 0) {
            console.log('processed ' + frameCount + ' frame(s), buf remaining: ' + this._buffer.length);
        }
    }

    _indexOf(buffer, search) {
        for (let i = 0; i <= buffer.length - search.length; i++) {
            let match = true;
            for (let j = 0; j < search.length; j++) {
                if (buffer[i + j] !== search[j]) { match = false; break; }
            }
            if (match) return i;
        }
        return -1;
    }

    // ── 帧长度校验（防止长度字段被干扰后解析越界） ──
    _checkFrameLen(frame, mode) {
        const minLen = { 0x11: 37, 0x12: 31, 0x13: 10, 0x14: 13, 0x15: 13, 0x16: 10 };
        const maxLen = { 0x11: 38, 0x12: 32, 0x13: 1024, 0x14: 256, 0x15: 14, 0x16: 256 };
        const min = minLen[mode] || 0;
        const max = maxLen[mode] || 0;
        if (frame.length < min || frame.length > max) {
            console.warn('Frame length invalid: type 0x' + mode.toString(16) +
                         ' len=' + frame.length + ' min=' + min + ' max=' + max);
            return false;
        }
        return true;
    }

    // ── Checksum 校验（与 C++ GP_driver.cpp 一致） ──
    _verifyChecksum(frame) {
        if (frame.length < 2) return false;
        let checksum = 0;
        for (let i = 0; i < frame.length - 1; i++) {
            checksum ^= frame[i];
        }
        const ok = (checksum & 0xFF) === frame[frame.length - 1];
        if (!ok) {
            const hex = Array.from(frame).map(b => b.toString(16).padStart(2, '0')).join(' ');
            console.warn('Checksum failed: calculated 0x' + (checksum & 0xFF).toString(16).padStart(2, '0') +
                         ' expected 0x' + frame[frame.length - 1].toString(16).padStart(2, '0') +
                         ' frame: ' + hex);
        }
        return ok;
    }

    // ── 帧数据解析（移植自 Trans_Data） ────────────
    _transData(buffer, mode) {
        try {
            switch (mode) {
            case 0x11: this._parseRealTimeData(buffer); break;
            case 0x12: this._parseAbnormalRecords(buffer); break;
            case 0x13: this._parseHistoricalLogs(buffer); break;
            case 0x14: this._parseBatteryInfo(buffer); break;
            case 0x15: this._parseRTCTime(buffer); break;
            case 0x16: this._parseBatteryCoding(buffer); break;
            }
        } catch(e) {
            console.error('_transData mode 0x' + mode.toString(16) + ' error: ' + e.message);
        }
    }

    _parseRealTimeData(buffer) {
        const batnumbur = buffer[22];
        const vol1 = [
            (buffer[28] << 8) | buffer[27],
            (buffer[30] << 8) | buffer[29],
            (buffer[32] << 8) | buffer[31],
            (buffer[34] << 8) | buffer[33]
        ];
        const zcur = (buffer[19] << 8) | buffer[18];
        const zvol = buffer[17] * 100;
        const zpower = (zvol * zcur) / 880;
        const vol = vol1[0] + vol1[1] + vol1[2] + vol1[3];
        const tmp = Math.floor(((buffer[14] << 8) | buffer[13]) / 10);
        const soh = buffer[12];
        const cyc = (buffer[36] << 8) | buffer[35];
        const soc = buffer[16];

        this._dm.setCellCount(batnumbur);
        this._dm.setTotalPower(zpower / 1000);
        const volV = vol / 1000;
        if (volV > 0.001) {
            this._dm.setTotalCurrent(zpower / vol);
        }
        this._dm.setBatteryTemp(tmp);
        this._dm.setCycleCount(cyc);

        for (let i = 0; i < 4; i++) {
            this._dm.setCellVoltage(i, vol1[i] / 1000, 4.45);
        }

        this._dm.setBatteryLevel(soc);
        this._dm.setBatteryHealth(soh);
        this._dm.setTotalVoltage(volV);
    }

    _parseAbnormalRecords(buffer) {
        const evol = (buffer[8] << 8) | buffer[7];
        const et   = (buffer[16] << 8) | buffer[15];
        const edt  = (buffer[24] << 8) | buffer[23];

        if (evol > 0) {
            const yy = (buffer[10] << 8) | buffer[9];
            let mm = buffer[11], DD = buffer[12];
            if (mm === 0 || DD === 0) { mm = 1; DD = 1; }
            const dt = new Date(bcdToDec16(yy >> 8, yy & 0xFF), bcdToDec(mm) - 1, bcdToDec(DD),
                                bcdToDec(buffer[13]), bcdToDec16(buffer[14] >> 8, buffer[14] & 0xFF));
            this._dm.setAbnormalRecord(0, (evol / 1000).toFixed(3) + " V", dt);
        }
        if (et > 0) {
            const yy = (buffer[18] << 8) | buffer[17];
            let mm = buffer[19], DD = buffer[20];
            if (mm === 0 || DD === 0) { mm = 1; DD = 1; }
            const dt = new Date(bcdToDec16(yy >> 8, yy & 0xFF), bcdToDec(mm) - 1, bcdToDec(DD),
                                bcdToDec(buffer[21]), bcdToDec16(buffer[22] >> 8, buffer[22] & 0xFF));
            this._dm.setAbnormalRecord(1, et.toFixed(1) + " C", dt);
        }
        if (edt > 0) {
            const yy = (buffer[26] << 8) | buffer[25];
            let mm = buffer[27], DD = buffer[28];
            if (mm === 0 || DD === 0) { mm = 1; DD = 1; }
            const dt = new Date(bcdToDec16(yy >> 8, yy & 0xFF), bcdToDec(mm) - 1, bcdToDec(DD),
                                bcdToDec(buffer[29]), bcdToDec16(buffer[30] >> 8, buffer[30] & 0xFF));
            this._dm.setAbnormalRecord(2, edt.toFixed(1) + " C", dt);
        }
    }

    _parseHistoricalLogs(buffer) {
        let ecnt = (buffer[9] << 8) | buffer[8];
        const maxRecords = Math.floor((buffer.length - 11) / 8);
        if (ecnt > maxRecords) {
            console.warn('0x13 record count exceeds frame capacity: ' + ecnt + ' > ' + maxRecords);
            ecnt = maxRecords;
        }
        let addr = 10;
        this._dm.clearHistoricalLogs();
        for (let i = 0; i < ecnt; i++) {
            let val = (buffer[addr + 1] << 8) | buffer[addr];
            const yy = (buffer[addr + 3] << 8) | buffer[addr + 2];
            const mm = buffer[addr + 4], DD = buffer[addr + 5];
            const hh = buffer[addr + 6], mi = buffer[addr + 7];
            addr += 8;
            const dt = new Date(bcdToDec16(yy >> 8, yy & 0xFF), bcdToDec(mm) - 1, bcdToDec(DD),
                                bcdToDec(hh), bcdToDec16(mi >> 8, mi & 0xFF));
            const typeBits = val & 0xC000;
            val &= ~0xC000;
            if (typeBits === 0x0000) {
                const v = (val / 1000).toFixed(3);
                this._dm.addHistoricalLog(0, v + " V", dt);
            } else if (typeBits === 0x8000) {
                const t = ntcTempLookup(val);
                this._dm.addHistoricalLog(1, t.toFixed(1) + " C", dt);
            } else if (typeBits === 0xC000) {
                const t = ntcTempLookup(val);
                this._dm.addHistoricalLog(2, t.toFixed(1) + " C", dt);
            }
        }
    }

    _parseBatteryInfo(buffer) {
        console.log('0x14: frame len=' + buffer.length + ' hex[8-14]=' +
            Array.from(buffer.slice(8, 15)).map(b => b.toString(16).padStart(2,'0')).join(' '));
        const yy = (buffer[9] << 8) | buffer[8];
        const xhlen = buffer[12];
        console.log('0x14: yy=' + yy + ' mm=' + buffer[10] + ' DD=' + buffer[11] + ' xhlen=' + xhlen);
        if (xhlen === 0 || xhlen > 128) {
            console.error('0x14: invalid xhlen=' + xhlen + ', skipping frame');
            return;
        }
        const batteryModel = String.fromCharCode(...buffer.slice(13, 13 + xhlen));
        console.log('0x14: batteryModel="' + batteryModel + '"');
        this._dm.setBatteryModel(batteryModel);
        const cjlen = buffer[xhlen + 13];
        console.log('0x14: cjlen=' + cjlen + ' at offset ' + (xhlen + 13));
        if (cjlen === undefined || cjlen > 128) {
            console.error('0x14: invalid cjlen=' + cjlen + ', skipping manufacturer');
            return;
        }
        const manufacturer = String.fromCharCode(...buffer.slice(xhlen + 14, xhlen + 14 + cjlen));
        console.log('0x14: manufacturer="' + manufacturer + '"');
        this._dm.setManufacturer(manufacturer);
        const pd = new Date(bcdToDec16(yy >> 8, yy & 0xFF), bcdToDec(buffer[10]) - 1, bcdToDec(buffer[11]));
        this._dm.setProductionDate(pd.toISOString().split('T')[0]);
        console.log('0x14: done');
    }

    _parseRTCTime(buffer) {
        const yy = 0x2000 + buffer[7];
        const mm = buffer[8], DD = buffer[9], hh = buffer[10], mi = buffer[11], ss = buffer[12];
        const str = yy.toString(16).toUpperCase().padStart(4, '0') + "年" +
                    mm.toString(16).toUpperCase().padStart(2, '0') + "月" +
                    DD.toString(16).toUpperCase().padStart(2, '0') + "日  " +
                    hh.toString(16).toUpperCase().padStart(2, '0') + ":" +
                    mi.toString(16).toUpperCase().padStart(2, '0') + ":" +
                    ss.toString(16).toUpperCase().padStart(2, '0');
        console.log("RTC:", str);
    }

    _parseBatteryCoding(buffer) {
        console.log('0x16: frame len=' + buffer.length + ' xx=' + buffer[8] + ' xhlen=' + buffer[9]);
        const xx = buffer[8];
        const xhlen = buffer[9];
        if (xhlen === 0 || xhlen > 128) {
            console.error('0x16: invalid xhlen=' + xhlen + ', skipping frame');
            return;
        }
        const rawModel = String.fromCharCode(...buffer.slice(10, 10 + xhlen));
        console.log('0x16: rawModel="' + rawModel + '"');
        const commaIdx = rawModel.indexOf(",");
        if (commaIdx >= 1) {
            const modelUp = rawModel.substring(0, commaIdx);
            const bufstr = rawModel.substring(commaIdx + 1);
            const pos2 = bufstr.indexOf(",");
            if (pos2 >= 1) {
                const manufacturer = bufstr.substring(0, pos2);
                const batteryModelUp = bufstr.substring(pos2 + 1);
                this._dm.setManufacturer(manufacturer);
                this._dm.setProductModel(modelUp);
                this._dm.setBatteryModel(batteryModelUp);
            } else {
                const batteryModelUp = rawModel.substring(commaIdx + 1);
                this._dm.setProductModel(modelUp);
                this._dm.setBatteryModel(batteryModelUp);
            }
        } else {
            this._dm.setBatteryModel(rawModel);
        }
        if (xx > 0) {
            const chalen = 10 + xhlen;
            const cjlen = buffer[chalen];
            console.log('0x16: xx>0, chalen=' + chalen + ' cjlen=' + cjlen);
            if (cjlen === undefined || cjlen > 128) {
                console.error('0x16: invalid cjlen=' + cjlen + ', skipping batteryCode');
            } else {
                const batteryCode = String.fromCharCode(...buffer.slice(chalen + 1, chalen + 1 + cjlen));
                console.log('0x16: batteryCode="' + batteryCode + '"');
                this._dm.setBatteryCode(batteryCode);
            }
        }
        console.log('0x16: done');
    }
}

/**
 * CircularProgressBar — 电池健康度圆环
 * 卡片外观由 CSS .widget-card 提供，Canvas 只绘制圆弧 + 百分比
 */
class CircularProgressBar {
    constructor(cardId) {
        this._card = document.getElementById(cardId);
        this._body = this._card.querySelector('.card-body');
        this._canvas = this._body.querySelector('canvas');
        this._ctx = this._canvas.getContext('2d');
        this._value = 0;
        this._connected = false;

        this._ro = observeResize(this._body, () => this._render());
    }

    setValue(v) {
        v = Math.max(0, Math.min(100, Math.round(v)));
        if (this._value !== v) { this._value = v; this._render(); }
    }

    setConnected(c) {
        if (this._connected !== c) { this._connected = c; this._render(); }
    }

    _color(v) {
        if (!this._connected) return '#B0B0B0';
        if (v >= 80) return '#4CAF50';   // 绿：100%–80%
        if (v >= 60) return '#F5C518';   // 黄：80%–60%
        return '#E53935';                // 红：60% 以下
    }

    _render() {
        const W = this._body.clientWidth, H = this._body.clientHeight;
        if (W < 4 || H < 4) return;

        const dpr = window.devicePixelRatio || 1;
        this._canvas.width = W * dpr;
        this._canvas.height = H * dpr;
        this._canvas.style.width = W + 'px';
        this._canvas.style.height = H + 'px';
        const ctx = this._ctx;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const c = this._connected;

        // 圆弧几何 — 居中，尽量大
        const side = Math.min(W * 0.88, H * 0.88);
        const cx = W / 2, cy = H / 2;
        const penW = side * 0.10;
        const radius = (side - penW) / 2;

        // 背景环
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = c ? '#DCDCDC' : '#C8C8C8';
        ctx.lineWidth = penW;
        ctx.lineCap = 'round';
        ctx.stroke();

        if (this._value > 0) {
            const fillColor = this._color(this._value);
            const totalDeg = this._value * 3.6;
            const sa = -90 * Math.PI / 180;
            const ea = (-90 + totalDeg) * Math.PI / 180;

            // 前景弧（单色）
            ctx.beginPath();
            ctx.arc(cx, cy, radius, sa, ea);
            ctx.strokeStyle = fillColor;
            ctx.lineWidth = penW;
            ctx.lineCap = 'butt';
            ctx.stroke();

            // 端点圆头（与弧同色）
            const dotR = penW / 2;
            ctx.fillStyle = fillColor;
            ctx.beginPath();
            ctx.arc(cx + radius * Math.cos(sa), cy + radius * Math.sin(sa), dotR, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + radius * Math.cos(ea), cy + radius * Math.sin(ea), dotR, 0, Math.PI * 2);
            ctx.fill();
        }

        // 百分比文字
        const fs = Math.max(10, Math.floor(side * 0.20));
        ctx.font = `bold ${fs}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        ctx.fillStyle = c ? '#1E1E1E' : '#B0B0B0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this._value + '%', cx, cy);
    }
}

/**
 * BatteryWidget — 当时电量
 * 卡片外观由 CSS .widget-card 提供，Canvas 只绘制电池图标 + 百分比
 */
class BatteryWidget {
    constructor(cardId) {
        this._card = document.getElementById(cardId);
        this._body = this._card.querySelector('.card-body');
        this._canvas = this._body.querySelector('canvas');
        this._ctx = this._canvas.getContext('2d');
        this._value = 0;
        this._connected = false;

        this._ro = observeResize(this._body, () => this._render());
    }

    setValue(v) {
        v = Math.max(0, Math.min(100, Math.round(v)));
        if (this._value !== v) { this._value = v; this._render(); }
    }

    setConnected(c) {
        if (this._connected !== c) { this._connected = c; this._render(); }
    }

    _colors(v) {
        if (!this._connected) return { main: '#B0B0B0', dark: '#C8C8C8' };
        if (v > 75) return { main: '#4CAF50', dark: '#388E3C' };
        if (v >= 20) return { main: '#F5C518', dark: '#E8960A' };
        return { main: '#E53935', dark: '#C62828' };
    }

    _render() {
        const W = this._body.clientWidth, H = this._body.clientHeight;
        if (W < 4 || H < 4) return;

        const dpr = window.devicePixelRatio || 1;
        this._canvas.width = W * dpr;
        this._canvas.height = H * dpr;
        this._canvas.style.width = W + 'px';
        this._canvas.style.height = H + 'px';
        const ctx = this._ctx;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const cols = this._colors(this._value);
        const cx = W / 2, cy = H / 2;

        // 文字大小
        const textFS = Math.max(10, Math.floor(H * 0.38));
        ctx.font = `bold ${textFS}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        const pctText = this._value + '%';
        const pctW = ctx.measureText(pctText).width;

        // 电池图标尺寸
        const iconSide = H * 0.60;
        const gap = H * 0.04;
        const totalW = pctW + gap + iconSide;
        const startX = cx - totalW / 2;
        const iconX = startX + pctW + gap;
        const iconY = cy - iconSide / 2;

        // 百分比文字
        ctx.fillStyle = cols.main;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(pctText, startX, cy);

        // 电池图标
        this._drawBattery(ctx, iconX, iconY, iconSide, cols);
    }

    _drawBattery(ctx, x, y, side, cols) {
        const bodyW = side * 0.58;
        const bodyH = side * 0.82;
        const capH = side * 0.06;
        const strokeW = bodyW * 0.09;
        const bodyX = x + (side - bodyW) / 2;
        const bodyY = y + capH;
        const bodyR = bodyW * 0.10;

        // 正极帽
        const capW = bodyW * 0.36;
        const capR = capW * 0.25;
        ctx.beginPath();
        ctx.roundRect(x + (side - capW) / 2, y, capW, capH + 1, capR);
        ctx.fillStyle = cols.main;
        ctx.fill();

        // 外壳
        ctx.beginPath();
        ctx.roundRect(bodyX, bodyY, bodyW, bodyH, bodyR);
        ctx.strokeStyle = cols.main;
        ctx.lineWidth = strokeW;
        ctx.lineJoin = 'round';
        ctx.stroke();

        // 内部填充
        const inset = strokeW * 0.8;
        const fillW = bodyW - 2 * inset;
        const fillBot = bodyY + bodyH - inset;
        const fillH = (bodyH - 2 * inset) * (this._value / 100);
        const fillY = fillBot - fillH;
        const fillR = bodyR * 0.6;

        if (fillH > 0.5) {
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(bodyX + inset, bodyY + inset, fillW, bodyH - 2 * inset, fillR);
            ctx.clip();
            const grad = ctx.createLinearGradient(0, fillY, 0, fillBot);
            grad.addColorStop(0, cols.dark);
            grad.addColorStop(1, cols.main);
            ctx.fillStyle = grad;
            ctx.fillRect(bodyX + inset, fillY, fillW, fillBot - fillY);
            ctx.restore();
        }
    }
}

 * GaugeWidget — 半圆仪表盘
 * 卡片外观由 CSS .widget-card 提供，Canvas 只绘制弧 + 指针 + 数值
 */
class GaugeWidget {
    constructor(cardId, cfg) {

        this._canvas = this._body.querySelector('canvas');

        this._min = cfg.minValue || 0;
        this._max = cfg.maxValue || 100;
        this._unit = cfg.unit || '';
        this._connected = false;

        this._ro = observeResize(this._body, () => this._render());
    }

    setValue(v) {
        v = Math.max(this._min, Math.min(this._max, v));
        if (Math.abs(this._value - v) > 1e-9) { this._value = v; this._render(); }
    }

    setConnected(c) {
        if (this._connected !== c) { this._connected = c; this._render(); }
    }

    _render() {
        const W = this._body.clientWidth, H = this._body.clientHeight;
        if (W < 4 || H < 4) return;

        const dpr = window.devicePixelRatio || 1;
        this._canvas.width = W * dpr;
        this._canvas.height = H * dpr;
        this._canvas.style.width = W + 'px';
        this._canvas.style.height = H + 'px';
        const ctx = this._ctx;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const conn = this._connected;

        // 中心与半径
        const centerX = W / 2;
        const arcTop = H * 0.02;
        const arcH = H * 0.72;
        const radius = Math.min(W * 0.46, arcH / 1.12);
        const arcW = radius * 0.22;
        const centerY = arcTop + radius + arcW * 0.4;

        // 背景弧（顺时针从左到右，走顶部半圆）
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, Math.PI, 0);
        ctx.strokeStyle = '#DEDEDE';
        ctx.lineWidth = arcW;
        ctx.lineCap = 'butt';
        ctx.stroke();

        // 前景弧（顺时针从左侧填充到右侧，走顶部半圆）
        const ratio = (this._value - this._min) / (this._max - this._min);
        if (ratio > 0.001) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, Math.PI + Math.PI * ratio);
            ctx.strokeStyle = conn ? '#F5C518' : '#C0C0C0';
            ctx.lineWidth = arcW;
            ctx.lineCap = 'butt';
            ctx.stroke();
        }

        // 刻度线
        const tickN = 10;
        const tickLen = arcW * 0.50;
        const tickW = Math.max(1.5, radius * 0.015);
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = tickW;
        ctx.lineCap = 'butt';
        for (let i = 0; i <= tickN; i++) {
            const ang = Math.PI - (Math.PI * i) / tickN;
            const cs = Math.cos(ang), sn = Math.sin(ang);
            ctx.beginPath();
            ctx.moveTo(centerX + (radius - tickLen * 0.3) * cs, centerY - (radius - tickLen * 0.3) * sn);
            ctx.lineTo(centerX + (radius + tickLen * 0.7) * cs, centerY - (radius + tickLen * 0.7) * sn);
            ctx.stroke();
        }

        // 指针（与 C++ 一致: rotateAngle = -90 + ratio * 180）
        const ptrAngle = (-90 + ratio * 180) * Math.PI / 180;
        const pLen = radius * 0.78;
        const pW = radius * 0.055;
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(ptrAngle);

        // 阴影
        const so = Math.max(1, radius * 0.02);
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(-pW + so, so); ctx.lineTo(so, -pLen + so); ctx.lineTo(pW + so, so);
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fill();

        // 指针体
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(-pW, 0); ctx.lineTo(0, -pLen); ctx.lineTo(pW, 0);
        ctx.closePath();
        if (conn) {
            const g = ctx.createLinearGradient(0, 0, 0, -pLen);
            g.addColorStop(0, '#F5A623'); g.addColorStop(1, '#E8960A');
            ctx.fillStyle = g;
        } else {
            ctx.fillStyle = '#C0C0C0';
        }
        ctx.fill();

        // 中心点
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.075, 0, Math.PI * 2);
        ctx.fillStyle = '#FFFFFF';
        ctx.fill();
        ctx.strokeStyle = '#CCCCCC';
        ctx.lineWidth = Math.max(0.5, radius * 0.01);
        ctx.stroke();
        ctx.restore();

        // 当前值
        const valFS = Math.max(10, Math.floor(radius * 0.24));
        ctx.font = `bold ${valFS}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        ctx.fillStyle = conn ? '#222222' : '#B0B0B0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const valY = arcTop + arcH + (H - arcTop - arcH) * 0.45;
        ctx.fillText(this._value.toFixed(3) + this._unit, centerX, valY);

        // 标签
        const lblFS = Math.max(7, Math.floor(radius * 0.16));
        ctx.font = `${lblFS}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        ctx.fillStyle = conn ? '#444444' : '#B0B0B0';
        ctx.textBaseline = 'middle';
        const limitY = centerY + arcW * 0.62;
        ctx.textAlign = 'right';
        ctx.fillText(this._max.toFixed(1) + this._unit, centerX + radius + arcW * 0.72, limitY);
        ctx.textAlign = 'left';
        ctx.fillText(this._min.toFixed(0) + this._unit, centerX - radius - arcW * 0.42, limitY);
    }
}

</script>
    <script>
/**
 * CellVoltageWidget — 电芯电压柱状图
 * 卡片外观由 CSS .widget-card 提供，Canvas 只绘制液柱 + 标签 + 电压值
 */
class CellVoltageWidget {
    constructor(cardId) {
        this._card = document.getElementById(cardId);
        this._body = this._card.querySelector('.card-body');
        this._canvas = this._body.querySelector('canvas');
        this._ctx = this._canvas.getContext('2d');
        this._cells = [{ voltage: 0, maxVoltage: 4.25 }];
        this._connected = false;

        this._ro = observeResize(this._body, () => this._render());
    }

    setCellCount(count) {
        count = Math.max(1, Math.min(32, count));
        while (this._cells.length < count) this._cells.push({ voltage: 0, maxVoltage: 4.25 });
        while (this._cells.length > count) this._cells.pop();
        this._render();
    }

    setCellVoltage(index, voltage, maxVoltage) {
        if (index < 0 || index >= this._cells.length) return;
        const cell = this._cells[index];
        if (maxVoltage > 0) cell.maxVoltage = maxVoltage;
        // 存储原始电压值（不钳制），柱状条视觉由 _render 中的 fillRatio 封顶
        const rawVoltage = Math.max(0, voltage);
        if (Math.abs(cell.voltage - rawVoltage) > 1e-9) { cell.voltage = rawVoltage; this._render(); }
    }

    setConnected(c) {
        if (this._connected !== c) { this._connected = c; this._render(); }
    }

    _render() {
        const W = this._body.clientWidth, H = this._body.clientHeight;
        if (W < 4 || H < 4) return;

        const dpr = window.devicePixelRatio || 1;
        this._canvas.width = W * dpr;
        this._canvas.height = H * dpr;
        this._canvas.style.width = W + 'px';
        this._canvas.style.height = H + 'px';
        const ctx = this._ctx;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const conn = this._connected;
        const n = this._cells.length;
        // 4电芯以内用4电芯尺寸，超过4个进一步缩小
        const useSmall = n > 4;
        const kBarRatio = useSmall ? 0.30 : 0.40;
        const kBarWidthRatio = useSmall ? 0.10 : 0.15;
        const totalRatio = kBarRatio + 0.14 + 0.13;
        const pad = H * 0.02;
        const barH = H * (kBarRatio / totalRatio);
        const barTop = pad;
        const labelH = H * (0.14 / totalRatio);
        const voltH = H * (0.13 / totalRatio);
        const cellW = W / n;

        for (let i = 0; i < n; i++) {
            const cLeft = cellW * i;
            const cMid = cLeft + cellW / 2;
            const barW = cellW * kBarWidthRatio;
            const barX = cMid - barW / 2;
            const barR = barW * 0.18;
            const cell = this._cells[i];
            const fillRatio = cell.maxVoltage > 0 ? Math.max(0, Math.min(1, cell.voltage / cell.maxVoltage)) : 0;

            // 背景条
            ctx.beginPath();
            ctx.roundRect(barX, barTop, barW, barH, barR);
            ctx.fillStyle = '#E0E0E0';
            ctx.fill();

            // 填充
            const fillH = barH * fillRatio;
            if (fillH > 0.3) {
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(barX, barTop, barW, barH, barR);
                ctx.clip();
                const fillY = barTop + barH - fillH;
                const grad = ctx.createLinearGradient(0, barTop, 0, barTop + barH);
                if (conn) {
                    grad.addColorStop(0, '#E8960A');
                    grad.addColorStop(1, '#F5C518');
                } else {
                    grad.addColorStop(0, '#C8C8C8');
                    grad.addColorStop(1, '#B0B0B0');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(barX, fillY, barW, fillH);
                ctx.restore();
            }

            // 电芯标签
            const lblFS = Math.max(7, Math.floor(labelH * 0.55));
            ctx.font = `${lblFS}px "PingFang SC", "Microsoft YaHei", sans-serif`;
            ctx.fillStyle = '#444444';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('电芯' + (i + 1), cMid, barTop + barH + labelH / 2);

            // 电压值
            const voltFS = Math.max(7, Math.floor(voltH * 0.60));
            ctx.font = `bold ${voltFS}px "PingFang SC", "Microsoft YaHei", sans-serif`;
            ctx.fillStyle = conn ? '#444444' : '#B0B0B0';
            ctx.fillText(cell.voltage.toFixed(3) + 'V', cMid, barTop + barH + labelH + voltH / 2);
        }
    }
}

        this._rowEls.forEach(el => { el.style.fontSize = rowFS + 'px'; });

        // 切换控件字号
        const btnFS = Math.max(8, Math.floor(cardH * 0.06));

        if (this._connected !== c) {

        if (headerEl) headerEl.style.fontSize = headerFS + 'px';

            for (const e of this._entries) {
                const d = e.time;
                const timeStr = d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate()
                    + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');

                    + '<span class="histlog-col-value">' + e.value + '</span>'
                    + '</div></div>';
            }
        }

        this._scrollEl.innerHTML = html;

        if (!this._connected) {
            this._scrollEl.querySelectorAll('.histlog-row').forEach(el => {

    <script>
    // ═══════════════════════════════════════════════════════════════
    //  LogManager — 右侧日志面板
    // ═══════════════════════════════════════════════════════════════
    const LogManager = {
        _el: null,
        _maxEntries: 200,

        init() {
            this._el = document.getElementById('log-entries');
            document.getElementById('log-clear-btn').addEventListener('click', () => this.clear());
            document.getElementById('log-copy-btn').addEventListener('click', () => this.copyAll());

            // 劫持 console 方法
            const self = this;
            ['log','warn','error','info','debug'].forEach(function(level) {
                const original = console[level];
                console[level] = function() {
                    original.apply(console, arguments);
                    const msg = Array.from(arguments).map(function(a) {
                        if (typeof a === 'object') {
                            try { return JSON.stringify(a); } catch(e) { return String(a); }
                        }
                        return String(a);
                    }).join(' ');
                    self.add(level, msg);
                };
            });
        },

        add(level, msg) {
            if (!this._el) return;
            const now = new Date();
            const time = now.toLocaleTimeString('zh-CN', { hour12: false }) + '.' +
                         String(now.getMilliseconds()).padStart(3, '0');

            const row = document.createElement('div');
            row.className = 'log-row log-' + level;
            row.innerHTML = '<span class="log-time">' + time + '</span>' +
                           '<span class="log-msg">' + this._escapeHtml(msg) + '</span>';

            this._el.appendChild(row);

            // 限制条数
            while (this._el.children.length > this._maxEntries) {
                this._el.removeChild(this._el.firstChild);
            }

            // 自动滚到底部
            this._el.scrollTop = this._el.scrollHeight;
        },

        clear() {
            if (this._el) this._el.innerHTML = '';
        },

        copyAll() {
            if (!this._el) return;
            const lines = [];
            this._el.querySelectorAll('.log-row').forEach(function(row) {
                const time = row.querySelector('.log-time').textContent;
                const msg = row.querySelector('.log-msg').textContent;
                lines.push(time + ' ' + msg);
            });
            const text = lines.join('\n');
            navigator.clipboard.writeText(text).then(function() {
                console.log('日志已复制到剪贴板 (' + lines.length + ' 条)');
            }).catch(function() {
                alert('复制失败，请手动选择日志文本后 Ctrl+C');
            });
        },

        _escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
    };
    </script>

            const show = logPanel.classList.toggle('visible');
            logToggle.classList.toggle('active', show);
            notifyLayoutChanged();
        });

        // 切换历史异常面板
        document.getElementById('abnormal-record').addEventListener('toggleHistoricalLog', function(e) {
            document.getElementById('right-panel').style.display = e.detail ? 'flex' : 'none';
            notifyLayoutChanged();
        });

        // 1. 数据中心
        const dm = new DataManager();

        // 2. 控件（统一卡片容器，canvas 在 .card-body 内）
        const healthBar      = new CircularProgressBar('health-bar');
        const batteryWidget  = new BatteryWidget('battery-level');
        const voltageGauge   = new GaugeWidget('gauge-voltage',   { title:"电池组总电压", minValue:0, maxValue:14.5, unit:"V" });
        const currentGauge   = new GaugeWidget('gauge-current',   { title:"电池组电流",   minValue:0, maxValue:10.0, unit:"A" });
        const powerGauge     = new GaugeWidget('gauge-power',     { title:"电池组功率",   minValue:0, maxValue:35.0, unit:"W" });
        const cellVoltage    = new CellVoltageWidget('cell-voltage');
        const cycleCount     = new CycleCountWidget('cycle-count');
        const batteryTemp    = new BatteryTempWidget('battery-temp');
        const abnormalRecord = new AbnormalRecordWidget('abnormal-record');
        const historicalLog  = new HistoricalLogWidget('historical-log-card', 'histlog-scroll');
        const batteryInfo    = new BatteryInfoBarWidget('battery-info');
        const deviceBlockReason = BrowserSupport.getDeviceBlockReason();

        // 3. 所有卡片标题字号统一按“电池健康度”卡片高度计算（与 A 版本一致）
        const healthTitleSource = document.getElementById('health-bar');
        const updateCardTitleFontSize = function() {
            const titleFS = Math.max(10, Math.floor(healthTitleSource.clientHeight * 0.11)) + 'px';
            document.querySelectorAll('.widget-card .card-title').forEach(function(titleEl) {
                titleEl.style.fontSize = titleFS;
            });
        };
        observeResize(healthTitleSource, updateCardTitleFontSize);
        updateCardTitleFontSize();

        // 4. DataManager 事件 → 控件
        dm.addEventListener('productModelChanged', function(e) {
            document.getElementById('model-label').textContent = '型号：' + e.detail;
        });

        dm.addEventListener('connectedChanged', function(e) {
            var c = e.detail;
            document.getElementById('conn-status').textContent = deviceBlockReason ? '⚠️ 设备不可用' : (c ? '🟢 已连接' : '🔴 未连接');
            healthBar.setConnected(c);
            batteryWidget.setConnected(c);
            voltageGauge.setConnected(c);
            currentGauge.setConnected(c);
            powerGauge.setConnected(c);
            cellVoltage.setConnected(c);
            cycleCount.setConnected(c);
            batteryTemp.setConnected(c);
            abnormalRecord.setConnected(c);
            historicalLog.setConnected(c);
        });

        dm.addEventListener('batteryHealthChanged', function(e) { healthBar.setValue(e.detail); });
        dm.addEventListener('batteryLevelChanged',  function(e) { batteryWidget.setValue(e.detail); });
        dm.addEventListener('totalVoltageChanged',  function(e) { voltageGauge.setValue(e.detail); });
        dm.addEventListener('totalCurrentChanged',  function(e) { currentGauge.setValue(e.detail); });
        dm.addEventListener('totalPowerChanged',    function(e) { powerGauge.setValue(e.detail); });
        dm.addEventListener('cycleCountChanged',    function(e) { cycleCount.setValue(e.detail); });
        dm.addEventListener('batteryTempChanged',   function(e) { batteryTemp.setValue(e.detail); });

        dm.addEventListener('cellCountChanged', function(e) { cellVoltage.setCellCount(e.detail); });
        dm.addEventListener('cellVoltageChanged', function(e) {
            cellVoltage.setCellVoltage(e.detail.index, e.detail.voltage, e.detail.maxVoltage);
        });

        dm.addEventListener('abnormalRecordChanged', function(e) {
            abnormalRecord.setRecord(e.detail.row, e.detail.value, e.detail.time);
        });
        dm.addEventListener('abnormalRecordCleared', function(e) {
            abnormalRecord.clearRecord(e.detail);
        });

        dm.addEventListener('historicalLogsCleared', function() {
            historicalLog.clearRecords();
        });
        dm.addEventListener('historicalLogsUpdated', function(e) {
            historicalLog.addRecord(e.detail.row, e.detail.value, e.detail.time);
        });

        dm.addEventListener('batteryModelChanged',  function(e) { batteryInfo.setBatteryModel(e.detail); });
        dm.addEventListener('manufacturerChanged',  function(e) { batteryInfo.setManufacturer(e.detail); });
        dm.addEventListener('productionDateChanged',function(e) { batteryInfo.setProductionDate(e.detail); });
        dm.addEventListener('batteryCodeChanged',   function(e) { batteryInfo.setBatteryCode(e.detail); });

        // 5. 初始默认值
        healthBar.setValue(0);
        batteryWidget.setValue(0);
        voltageGauge.setValue(0);
        currentGauge.setValue(0);
        powerGauge.setValue(0);
        cycleCount.setValue(0);
        batteryTemp.setValue(0);
        cellVoltage.setCellCount(1);
        cellVoltage.setCellVoltage(0, 0, 4.25);

        healthBar.setConnected(false);
        batteryWidget.setConnected(false);
        voltageGauge.setConnected(false);
        currentGauge.setConnected(false);
        powerGauge.setConnected(false);
        cellVoltage.setConnected(false);
        cycleCount.setConnected(false);
        batteryTemp.setConnected(false);
        abnormalRecord.setConnected(false);
        historicalLog.setConnected(false);

        batteryInfo.setBatteryModel('--');
        batteryInfo.setBatteryCode('--');

        // 6. 启动 GPDriver
        if (deviceBlockReason) {
            BrowserSupport.showBanner(deviceBlockReason);
            document.getElementById('conn-status').textContent = '⚠️ 设备不可用';
            console.warn(deviceBlockReason);
        } else {
            var driver = new GPDriver(dm);
            driver.start();
            window.addEventListener('pagehide', function(e) { if (!e.persisted) driver.stop(); });
        }
        notifyLayoutChanged();
    });
    </script>
</body>
</html>
