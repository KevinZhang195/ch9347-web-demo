<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的电池管家 · Mock C · 智能家电风 · PC</title>
<style>
  :root {
    --bg: #F0F2F5;
    --card: #FFFFFF;
    --text-primary: #1F2329;
    --text-secondary: #6B7280;
    --text-tertiary: #9CA3AF;
    --shadow: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-hero: 0 4px 20px rgba(0,0,0,0.06);

    /* 语义色阈值同 release */
    --green-bg: #E8F5E9; --green-fg: #2E7D32; --green-strong: #43A047;
    --orange-bg: #FFF3E0; --orange-fg: #E65100; --orange-strong: #FB8C00;
    --red-bg: #FFEBEE;    --red-fg: #C62828;   --red-strong: #E53935;

    --blue-bg:  #E3F2FD; --blue-fg:  #1565C0; --blue-strong: #1E88E5;
    --purple-bg: #F3E5F5; --purple-fg: #6A1B9A; --purple-strong: #8E24AA;
    --grey-bg: #ECEEF1; --grey-fg: #4B5563;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100vh; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.4;
    padding-bottom: 40px;
    font-feature-settings: 'tnum' on;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

  .scenario-bar {
    position: sticky; top: 0; z-index: 20;
    background: rgba(240,242,245,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 12px 32px; border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .scenario-bar .label { font-size: 13px; color: var(--text-tertiary); margin-right: 4px; }
  .scenario-bar button {
    border: 0; background: #FFF; color: var(--text-primary);
    padding: 7px 14px; border-radius: 100px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .scenario-bar button.on { background: var(--text-primary); color: #fff; }
  .scenario-bar button:hover:not(.on) { background: #f7f8fa; }

  .header { padding: 20px 4px 12px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
  .header .left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.3px; }
  .header h1 .dot-sep {
    display: inline-block;
    font-size: 1.5em; line-height: 0; vertical-align: -0.05em;
    margin: 0 0.28em;
    color: #F76F1F;
    font-weight: 400;
  }
  .header .sub { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
  .header .product-badge {
    display: inline-flex; align-items: center;
    font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
    color: #fff;
    padding: 6px 14px; border-radius: 100px;
    background: linear-gradient(135deg, #FDBB2D, #F76F1F);
    box-shadow: 0 2px 8px rgba(247,111,31,0.25);
  }
  .brand-logo {
    height: 48px;
    display: flex; align-items: center;
  }
  .brand-logo img {
    height: 100%; width: auto; display: block;
    /* 把原图色调转成 C 版主题橙 #F76F1F —— 用 filter 精调后的近似值 */
    filter: brightness(0) saturate(100%) invert(45%) sepia(88%) saturate(2870%) hue-rotate(2deg) brightness(102%) contrast(102%);
  }

  /* HERO */
  .hero-card {
    border-radius: 24px; padding: 28px 32px;
    background: var(--green-bg); color: var(--green-fg);
    box-shadow: var(--shadow-hero);
    display: flex; align-items: center; gap: 32px;
    margin-bottom: 20px;
  }
  .hero-card.warn   { background: var(--orange-bg); color: var(--orange-fg); }
  .hero-card.danger { background: var(--red-bg); color: var(--red-fg); }
  .hero-card.grey   { background: var(--grey-bg); color: var(--grey-fg); }
  .hero-battery {
    width: 180px; height: 100px; position: relative; flex-shrink: 0;
    border: 4px solid currentColor; border-radius: 14px; padding: 6px;
  }
  .hero-battery::after {
    content:''; position:absolute; right:-10px; top:32px;
    width:8px; height:28px; background: currentColor; border-radius: 0 4px 4px 0;
  }
  .hero-battery-fill {
    height:100%; background: currentColor; border-radius: 6px;
    transition: width .8s cubic-bezier(.4,0,.2,1);
  }
  .hero-text { flex:1; min-width: 0; }
  .hero-percent { font-size: 64px; font-weight: 700; letter-spacing: -1.6px; line-height: 1; font-variant-numeric: tabular-nums; }
  .hero-percent .u { font-size: 26px; font-weight: 500; margin-left: 3px; opacity: 0.75; }
  .hero-msg { font-size: 22px; font-weight: 600; margin-top: 12px; }
  .hero-sub { font-size: 15px; opacity: 0.85; margin-top: 6px; }

  /* 三宫格 */
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .tint-card {
    border-radius: 20px; padding: 22px 22px 18px;
    box-shadow: var(--shadow);
    background: var(--card); color: var(--text-primary);
    display: flex; flex-direction: column; gap: 6px; min-height: 160px;
  }
  .tint-card.tint-blue   { background: var(--blue-bg);   color: var(--blue-fg); }
  .tint-card.tint-orange { background: var(--orange-bg); color: var(--orange-fg); }
  .tint-card.tint-purple { background: var(--purple-bg); color: var(--purple-fg); }
  .tint-card.tint-green  { background: var(--green-bg);  color: var(--green-fg); }
  .tint-card.tint-red    { background: var(--red-bg);    color: var(--red-fg); }
  .card-icon-box {
    width: 44px; height: 44px; border-radius: 14px;
    background: rgba(255,255,255,0.65);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }
  .card-icon-box svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .card-label { font-size: 15px; opacity: 0.8; font-weight: 500; }
  .card-value {
    font-size: 40px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .card-value .u { font-size: 18px; font-weight: 500; opacity: 0.7; margin-left: 3px; }
  .card-desc { font-size: 14px; opacity: 0.75; margin-top: 2px; }

  /* 实时数据行（3 列灰底大字） */
  .live-card {
    background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
    padding: 20px 32px; margin-bottom: 20px;
  }
  .live-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .live-cell { text-align: center; }
  .live-cell + .live-cell { border-left: 1px solid rgba(0,0,0,0.06); }
  .live-cell .k { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .live-cell .v { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.6px; }
  .live-cell .v .u { font-size: 15px; color: var(--text-secondary); font-weight: 500; margin-left: 2px; }

  /* 中行 */
  .row-mid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card-plain { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); padding: 22px; }
  .card-plain h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .card-plain .meta { font-size: 13px; color: var(--text-secondary); }
  .card-plain .meta strong { color: var(--text-primary); font-weight: 500; font-variant-numeric: tabular-nums; }

  /* 电芯 */
  .cells-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 14px; }
  .cell-tile {
    background: #F7F8FA; border-radius: 14px; padding: 14px 8px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .cell-idx { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
  .cell-bar-wrap { width: 26px; height: 100px; background: #E4E7EC; border-radius: 5px; overflow: hidden; display: flex; align-items: flex-end; }
  .cell-bar-fill {
    width: 100%; background: linear-gradient(180deg, var(--green-strong), #66BB6A);
    transition: height .5s, background .3s;
  }
  .cell-bar-fill.warn { background: linear-gradient(180deg, var(--orange-strong), #FFA726); }
  .cell-v { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .cell-v .u { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-left: 1px; }

  /* 异常记录 3 卡 */
  .abn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
  .abn-tile {
    display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 14px;
    background: var(--green-bg); color: var(--green-fg);
  }
  .abn-tile.hit { background: var(--red-bg); color: var(--red-fg); }
  .abn-tile .aicon {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
  }
  .abn-tile .aicon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .abn-title { font-size: 16px; font-weight: 600; }
  .abn-sub { font-size: 13px; opacity: 0.75; margin-top: 2px; }
  .abn-value { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* 历史日志（可折叠 + 可拉伸） */
  .logs-card { padding: 0; overflow: hidden; }
  .logs-head {
    padding: 22px 26px; cursor: pointer; user-select: none;
    display: flex; justify-content: space-between; align-items: center;
    transition: background .15s;
  }
  .logs-head:hover { background: #F7F8FA; }
  .logs-head h3 { font-size: 17px; font-weight: 600; }
  .logs-head .right { display: flex; align-items: center; gap: 12px; }
  .logs-head .meta { font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .logs-head .chev {
    width: 28px; height: 28px; color: var(--text-tertiary);
    background: #F0F2F5; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s;
  }
  .logs-head .chev svg { width: 14px; height: 14px; }
  .logs-card.open .logs-head .chev { transform: rotate(180deg); }
  .logs-body {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease;
    border-top: 0 solid rgba(0,0,0,0.06);
  }
  .logs-card.open .logs-body { max-height: 2000px; border-top-width: 1px; }
  .logs-scroll {
    resize: vertical; overflow: auto;
    min-height: 240px; max-height: 800px; height: 320px;
    padding: 0;
  }
  table.logs { width: 100%; table-layout: fixed; border-collapse: collapse; font-size: 14px; }
  table.logs th, table.logs td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.05); }
  table.logs th { background: #F7F8FA; color: var(--text-secondary); font-weight: 500; font-size: 13px; position: sticky; top: 0; z-index: 1; }
  table.logs td { font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  table.logs tr:last-child td { border-bottom: 0; }
  table.logs .cat-chip { display: inline-block; padding: 3px 12px; border-radius: 100px; background: var(--red-bg); color: var(--red-fg); font-size: 13px; font-weight: 500; }
  .logs-empty { padding: 40px; text-align: center; color: var(--text-tertiary); font-size: 15px; }

  /* 电池信息 · 4 列 */
  .info-card {
    background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
    padding: 22px 26px;
  }
  .info-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
  .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .info-item .k { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .info-item .v { font-size: 15px; font-weight: 500; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .disconnected .container > *:not(.scenario-bar):not(.header):not(.hero-card) { opacity: 0.35; pointer-events: none; }

  @media (max-width: 1100px) {
    .row-mid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 900px) {
    .container { padding: 0 20px; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .grid-3 .tint-card:last-child { grid-column: span 2; }
    .live-row { grid-template-columns: 1fr; gap: 16px; }
    .live-cell + .live-cell { border-left: 0; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 16px; }
    .hero-card { flex-direction: column; text-align: center; padding: 24px; gap: 20px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 560px) {
    .grid-3 { grid-template-columns: 1fr; }
    .grid-3 .tint-card:last-child { grid-column: span 1; }
    .cells-grid { grid-template-columns: repeat(2, 1fr); }
    .info-grid { grid-template-columns: 1fr; }
    .hero-percent { font-size: 48px; }
    .card-value { font-size: 32px; }
    table.logs th, table.logs td { padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="scenario-bar">
  <span class="label">Mock 场景：</span>
  <button data-s="normal" class="on">正常</button>
  <button data-s="full">满电</button>
  <button data-s="tempAlert">过温事件</button>
  <button data-s="lowBattery">低电量</button>
  <button data-s="disconnected">未连接</button>
</div>

<div class="container">
  <div class="header">
    <div class="left">
      <div>
        <h1>移动电源<span class="dot-sep">·</span>智能管家</h1>
        <div class="sub" id="conn-line">已连接</div>
      </div>
      <span class="product-badge" id="product-badge">CH9347-PB-6S</span>
    </div>
    <div class="brand-logo" aria-label="传应 LOGO">
      <img src="./../../release/assets/logo/logo_final_3.png" alt="传应">
    </div>
  </div>

  <!-- HERO -->
  <div class="hero-card" id="hero-card">
    <div class="hero-battery">
      <div class="hero-battery-fill" id="hero-fill" style="width: 72%"></div>
    </div>
    <div class="hero-text">
      <div class="hero-percent"><span id="soc-num">72</span><span class="u">%</span></div>
      <div class="hero-msg" id="hero-msg">电量充足</div>
      <div class="hero-sub" id="hero-sub">电池组当前状态良好</div>
    </div>
  </div>

  <!-- 3 张分区色小卡 -->
  <div class="grid-3">
    <div class="tint-card tint-blue" id="soh-card">
      <div class="card-icon-box">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="7"/><path d="M8.21 13.89 7 22l5-3 5 3-1.21-8.12"/></svg>
      </div>
      <div class="card-label">电池评分</div>
      <div class="card-value"><span id="soh-num">92</span><span class="u">分</span></div>
      <div class="card-desc" id="soh-desc">状态优秀</div>
    </div>
    <div class="tint-card tint-orange">
      <div class="card-icon-box">
        <svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
      </div>
      <div class="card-label">电芯温度</div>
      <div class="card-value"><span id="temp-num">26</span><span class="u">°C</span></div>
      <div class="card-desc">当前温度</div>
    </div>
    <div class="tint-card tint-purple">
      <div class="card-icon-box">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </div>
      <div class="card-label">充放电次数</div>
      <div class="card-value"><span id="cycle-num">238</span><span class="u">次</span></div>
      <div class="card-desc">累计计数</div>
    </div>
  </div>

  <!-- 实时数据 -->
  <div class="live-card">
    <div class="live-row">
      <div class="live-cell"><div class="k">总电压</div><div class="v"><span id="v-pack">24.6</span><span class="u">V</span></div></div>
      <div class="live-cell"><div class="k">当前电流</div><div class="v"><span id="i-pack">1.20</span><span class="u">A</span></div></div>
      <div class="live-cell"><div class="k">当前功率</div><div class="v"><span id="p-pack">29.5</span><span class="u">W</span></div></div>
    </div>
  </div>

  <!-- 电芯 + 异常 -->
  <div class="row-mid">
    <div class="card-plain">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <h3>单电池电压</h3>
        <div class="meta">共 <strong id="cells-count">4</strong> 节</div>
      </div>
      <div class="cells-grid" id="cells-list"></div>
    </div>

    <div class="card-plain">
      <h3>异常状态</h3>
      <div class="abn-stack" id="abn-list"></div>
    </div>
  </div>

  <!-- 电池信息 -->
  <div class="info-card" style="margin-bottom:20px;">
    <div class="info-title">电池信息</div>
    <div class="info-grid">
      <div class="info-item"><div class="k">电池型号</div><div class="v" id="bi-model">--</div></div>
      <div class="info-item"><div class="k">生产厂家</div><div class="v" id="bi-mfr">--</div></div>
      <div class="info-item"><div class="k">生产日期</div><div class="v" id="bi-date">--</div></div>
      <div class="info-item"><div class="k">电池编码</div><div class="v" id="bi-code">--</div></div>
    </div>
  </div>

  <!-- 历史异常记录（默认收起，可拉伸） -->
  <div class="card-plain logs-card" id="logs-card" style="padding:0;">
    <div class="logs-head" id="logs-head">
      <h3>历史异常记录</h3>
      <div class="right">
        <span class="meta" id="log-count">共 0 条</span>
        <span class="chev">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </span>
      </div>
    </div>
    <div class="logs-body">
      <div class="logs-scroll" id="log-table-wrap"></div>
    </div>
  </div>
</div>

<script>
const scenarios = {
  normal:      { connected:true, productModel:'CH9347-PB-6S', soc:72, soh:92, temp:26, vPack:24.6, iPack:1.20, pPack:29.5, cycle:238,
                 cells:[4.10,4.09,4.11,4.10], abnormals:{ volt:null, chargeOT:null, dischargeOT:null }, logs:[],
                 battery:{ model:'PL-18650-12S6P', mfr:'ACE Cells', date:'2025-08-15', code:'PB-2601-A9F3' } },
  full:        { connected:true, productModel:'CH9347-PB-6S', soc:100, soh:92, temp:27, vPack:25.2, iPack:0.10, pPack:2.5, cycle:238,
                 cells:[4.20,4.19,4.20,4.20], abnormals:{ volt:null, chargeOT:null, dischargeOT:null }, logs:[],
                 battery:{ model:'PL-18650-12S6P', mfr:'ACE Cells', date:'2025-08-15', code:'PB-2601-A9F3' } },
  tempAlert:   { connected:true, productModel:'CH9347-PB-6S', soc:55, soh:88, temp:48, vPack:23.7, iPack:3.20, pPack:75.8, cycle:240,
                 cells:[3.95,3.94,3.96,3.95],
                 abnormals:{ volt:null, chargeOT:{ value:'48.0 C', time:'2026-07-20 14:32' }, dischargeOT:null },
                 logs:[
                   { row:1, category:'充电过温', value:'48.0 C', time:'2026-07-20 14:32' },
                   { row:1, category:'充电过温', value:'46.5 C', time:'2026-07-17 10:14' },
                   { row:0, category:'电压异常', value:'4.312 V', time:'2026-06-30 09:22' },
                 ],
                 battery:{ model:'PL-18650-12S6P', mfr:'ACE Cells', date:'2025-08-15', code:'PB-2601-A9F3' } },
  lowBattery:  { connected:true, productModel:'CH9347-PB-6S', soc:8, soh:92, temp:25, vPack:21.6, iPack:0.90, pPack:19.4, cycle:241,
                 cells:[3.60,3.58,3.62,3.60], abnormals:{ volt:null, chargeOT:null, dischargeOT:null },
                 logs:[{ row:0, category:'电压异常', value:'2.985 V', time:'2026-06-30 09:22' }],
                 battery:{ model:'PL-18650-12S6P', mfr:'ACE Cells', date:'2025-08-15', code:'PB-2601-A9F3' } },
  disconnected:{ connected:false }
};

/* SOC / SOH 分色（与 release 一致） */
function socHero(v){
  if(v > 75)  return { klass:'',       msg:'电量充足', sub:'电池组当前状态良好' };
  if(v >= 20) return { klass:'warn',   msg:'电量适中', sub:'仍在正常使用范围' };
  return           { klass:'danger', msg:'电量不足',  sub:'请尽快为设备充电' };
}
function sohClass(v){ if(v>=80) return 'tint-blue'; if(v>=60) return 'tint-orange'; return 'tint-red'; }
function sohDesc(v){ if(v>=80) return '状态优秀'; if(v>=60) return '状态良好'; return '建议检查'; }

const $ = id => document.getElementById(id);

function iconWarn(){ return '<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>'; }
function iconCheck(){ return '<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>'; }

function render(name){
  const scn = scenarios[name];
  const hero = $('hero-card');
  document.body.classList.toggle('disconnected', !scn.connected);

  if(!scn.connected){
    $('conn-line').textContent = '未连接';
    $('product-badge').textContent = '--';
    hero.className = 'hero-card grey';
    $('soc-num').textContent = '--';
    $('hero-fill').style.width = '0%';
    $('hero-msg').textContent = '还没有连接到电池';
    $('hero-sub').textContent = '请检查数据线或电源';
    /* 其余卡片全部归零 */
    $('soh-num').textContent = '--';
    $('soh-card').className = 'tint-card';
    $('soh-desc').textContent = '';
    $('temp-num').textContent = '--';
    $('cycle-num').textContent = '--';
    $('v-pack').textContent = '--';
    $('i-pack').textContent = '--';
    $('p-pack').textContent = '--';
    $('cells-count').textContent = '--';
    $('cells-list').innerHTML = '';
    $('abn-list').innerHTML = '';
    $('log-count').textContent = '共 -- 条';
    $('log-table-wrap').innerHTML = '<div class="logs-empty">未连接</div>';
    $('bi-model').textContent = '--';
    $('bi-mfr').textContent = '--';
    $('bi-date').textContent = '--';
    $('bi-code').textContent = '--';
    return;
  }

  $('conn-line').textContent = '已连接';
  $('product-badge').textContent = scn.productModel;

  /* HERO */
  const h = socHero(scn.soc);
  hero.className = 'hero-card ' + h.klass;
  $('soc-num').textContent = scn.soc;
  $('hero-fill').style.width = Math.max(2, Math.min(100, scn.soc)) + '%';
  $('hero-msg').textContent = h.msg;
  $('hero-sub').textContent = h.sub;

  /* SOH */
  $('soh-num').textContent = scn.soh;
  $('soh-card').className = 'tint-card ' + sohClass(scn.soh);
  $('soh-desc').textContent = sohDesc(scn.soh);

  /* 其余 */
  $('temp-num').textContent = scn.temp;
  $('cycle-num').textContent = scn.cycle;
  $('v-pack').textContent = scn.vPack.toFixed(1);
  $('i-pack').textContent = scn.iPack.toFixed(2);
  $('p-pack').textContent = scn.pPack.toFixed(1);

  /* 电芯 */
  const cells = scn.cells;
  const cellMax = Math.max(...cells), cellMin = Math.min(...cells);
  $('cells-count').textContent = cells.length;
  const avg = cells.reduce((s,v)=>s+v,0)/cells.length;
  const listWrap = $('cells-list'); listWrap.innerHTML = '';
  cells.forEach((v, i) => {
    const pct = Math.max(6, Math.min(100, Math.round((v - 3.0) / 1.25 * 100)));
    const warn = Math.abs(v - avg) > 0.05;
    const el = document.createElement('div');
    el.className = 'cell-tile';
    el.innerHTML = `<span class="cell-idx">第 ${i+1} 节</span>
                    <div class="cell-bar-wrap"><div class="cell-bar-fill${warn?' warn':''}" style="height:${pct}%"></div></div>
                    <div class="cell-v">${v.toFixed(2)}<span class="u">V</span></div>`;
    listWrap.appendChild(el);
  });

  /* 异常 3 项 */
  const abn = scn.abnormals;
  const abnList = $('abn-list');
  const rows = [
    { key:'电压异常', hit: !!abn.volt,        value: abn.volt?.value        || '正常', time: abn.volt?.time || '未触发' },
    { key:'充电过温', hit: !!abn.chargeOT,    value: abn.chargeOT?.value    || '正常', time: abn.chargeOT?.time || '未触发' },
    { key:'放电过温', hit: !!abn.dischargeOT, value: abn.dischargeOT?.value || '正常', time: abn.dischargeOT?.time || '未触发' },
  ];
  abnList.innerHTML = rows.map(r => `
    <div class="abn-tile ${r.hit ? 'hit':''}">
      <div class="aicon">${r.hit ? iconWarn() : iconCheck()}</div>
      <div>
        <div class="abn-title">${r.key}</div>
        <div class="abn-sub">${r.time}</div>
      </div>
      <div class="abn-value">${r.value}</div>
    </div>
  `).join('');

  /* 历史日志 · 三列等宽 */
  const wrap = $('log-table-wrap');
  $('log-count').textContent = '共 ' + scn.logs.length + ' 条';
  if(!scn.logs.length){
    wrap.innerHTML = '<div class="logs-empty">近期没有异常记录</div>';
  } else {
    wrap.innerHTML = `<table class="logs">
      <colgroup><col style="width:33.33%"><col style="width:33.33%"><col style="width:33.34%"></colgroup>
      <thead><tr><th>类型</th><th>数值</th><th>时间</th></tr></thead>
      <tbody>${scn.logs.map(l => `<tr>
        <td><span class="cat-chip">${l.category}</span></td>
        <td>${l.value}</td>
        <td>${l.time}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  /* 电池信息（不含产品型号） */
  $('bi-model').textContent = scn.battery.model;
  $('bi-mfr').textContent = scn.battery.mfr;
  $('bi-date').textContent = scn.battery.date;
  $('bi-code').textContent = scn.battery.code;
}

/* 折叠交互 */
document.getElementById('logs-head').addEventListener('click', () => {
  document.getElementById('logs-card').classList.toggle('open');
});

document.querySelectorAll('.scenario-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scenario-bar button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    render(btn.dataset.s);
  });
});
render('normal');
</script>
</body>
</html>
